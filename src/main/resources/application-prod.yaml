spring:
  application:
    name: ${SPRING_APPLICATION_NAME}
  config:
    activate:
      on-profile: prod
  datasource:
    password: ${DATABASE_PASSWORD}
    username: ${DATABASE_USERNAME}
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
  h2:
    console:
      enabled: false
  servlet:
    multipart:
      max-file-size: ${FILE_UPLOAD_MAX_SIZE}
      max-request-size: ${FILE_UPLOAD_MAX_REQUEST_SIZE}

springdoc:
  api-docs:
    path: ${SPRINGDOC_API_DOCS_PATH}
  swagger-ui:
    path: ${SPRINGDOC_SWAGGER_UI_PATH}

server:
  port: ${PORT}
  shutdown: ${SERVER_SHUTDOWN}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION_MS}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS}
    allowed-methods: ${CORS_ALLOWED_METHODS}
    allowed-headers: ${CORS_ALLOWED_HEADERS}
    max-age: ${CORS_MAX_AGE}
  file:
    allowed-types:
      jpg: ${FILE_ALLOWED_TYPES_JPG}
      jpeg: ${FILE_ALLOWED_TYPES_JPEG}
      png: ${FILE_ALLOWED_TYPES_PNG}
      pdf: ${FILE_ALLOWED_TYPES_PDF}
      docx: ${FILE_ALLOWED_TYPES_DOCX}
    storage:
      root-path: ${FILE_STORAGE_ROOT_PATH}
    upload:
      max-size: ${FILE_UPLOAD_MAX_SIZE}
    cleanup:
      enabled: ${FILE_CLEANUP_ENABLED}
      fixed-delay: ${FILE_CLEANUP_FIXED_DELAY}
      orphan-grace-period: ${FILE_CLEANUP_ORPHAN_GRACE_PERIOD}
