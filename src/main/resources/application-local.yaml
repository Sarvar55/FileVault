spring:
  application:
    name: file-vault
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:file_vault;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 12345
    driver-class-name: org.h2.Driver
    dialect: org.hibernate.dialect.H2Dialect
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: false
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  devtools:
    restart:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
  shutdown: graceful

app:
  jwt:
    secret: local-development-jwt-secret-32-bytes
    expiration: 3600000
  cors:
    allowed-origins: http://localhost:3000
    allow-credentials: true
    allowed-methods: "*"
    allowed-headers: "*"
    max-age: 3600
  file:
    allowed-types:
      jpg: image/jpeg
      jpeg: image/jpeg
      png: image/png
      pdf: application/pdf
      docx: application/vnd.openxmlformats-officedocument.wordprocessingml.document
    storage:
      root-path: ./storage/local
    upload:
      max-size: 10MB
    cleanup:
      enabled: false
      fixed-delay: PT1H
      orphan-grace-period: PT24H
